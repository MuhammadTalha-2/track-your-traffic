<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>

    <!-- Background gradient: deep navy to midnight blue -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="1200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0B1628"/>
      <stop offset="100%" stop-color="#0F2340"/>
    </linearGradient>

    <!-- Chart line: cyan → indigo -->
    <linearGradient id="lineGrad" x1="200" y1="0" x2="960" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>

    <!-- Area fill under chart (top = cyan, bottom = transparent) -->
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>

    <!-- Pin: orange → red -->
    <linearGradient id="pinGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>

    <!-- Glow on chart line -->
    <filter id="lineGlow" x="-15%" y="-60%" width="130%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow under pin -->
    <filter id="pinShadow" x="-40%" y="-20%" width="180%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="16"
                    flood-color="#EF4444" flood-opacity="0.45"/>
    </filter>

    <!-- Soft glow behind pin -->
    <filter id="pinGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ── Background ──────────────────────────────────────────────── -->
  <rect width="1200" height="1200" rx="230" ry="230" fill="url(#bgGrad)"/>

  <!-- Subtle radial highlight top-left -->
  <radialGradient id="rimLight" cx="15%" cy="10%" r="55%" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#1E4A7C" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#0B1628"  stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="1200" rx="230" ry="230" fill="url(#rimLight)"/>

  <!-- ── Dot grid ────────────────────────────────────────────────── -->
  <g fill="#4B7AB5" opacity="0.12">
    <!-- 7 × 7 evenly-spaced dots -->
    <circle cx="240" cy="260" r="4"/> <circle cx="420" cy="260" r="4"/> <circle cx="600" cy="260" r="4"/> <circle cx="780" cy="260" r="4"/> <circle cx="960" cy="260" r="4"/>
    <circle cx="240" cy="420" r="4"/> <circle cx="420" cy="420" r="4"/> <circle cx="600" cy="420" r="4"/> <circle cx="780" cy="420" r="4"/> <circle cx="960" cy="420" r="4"/>
    <circle cx="240" cy="580" r="4"/> <circle cx="420" cy="580" r="4"/> <circle cx="600" cy="580" r="4"/> <circle cx="780" cy="580" r="4"/> <circle cx="960" cy="580" r="4"/>
    <circle cx="240" cy="740" r="4"/> <circle cx="420" cy="740" r="4"/> <circle cx="600" cy="740" r="4"/> <circle cx="780" cy="740" r="4"/> <circle cx="960" cy="740" r="4"/>
    <circle cx="240" cy="900" r="4"/> <circle cx="420" cy="900" r="4"/> <circle cx="600" cy="900" r="4"/> <circle cx="780" cy="900" r="4"/> <circle cx="960" cy="900" r="4"/>
  </g>

  <!-- ── Horizontal guide lines (dashed) ───────────────────────── -->
  <g stroke="#1A3356" stroke-width="1.5" stroke-dasharray="7 10" opacity="0.7">
    <line x1="220" y1="420" x2="1000" y2="420"/>
    <line x1="220" y1="570" x2="1000" y2="570"/>
    <line x1="220" y1="720" x2="1000" y2="720"/>
    <line x1="220" y1="870" x2="1000" y2="870"/>
  </g>

  <!-- ── Axes ────────────────────────────────────────────────────── -->
  <line x1="220" y1="960" x2="1000" y2="960" stroke="#1A3356" stroke-width="3"/>
  <line x1="220" y1="280" x2="220"  y2="960" stroke="#1A3356" stroke-width="3"/>

  <!-- Y-axis ticks -->
  <g stroke="#1A3356" stroke-width="2">
    <line x1="208" y1="420" x2="232" y2="420"/>
    <line x1="208" y1="570" x2="232" y2="570"/>
    <line x1="208" y1="720" x2="232" y2="720"/>
    <line x1="208" y1="870" x2="232" y2="870"/>
  </g>
  <!-- X-axis ticks -->
  <g stroke="#1A3356" stroke-width="2">
    <line x1="370"  y1="948" x2="370"  y2="972"/>
    <line x1="520"  y1="948" x2="520"  y2="972"/>
    <line x1="670"  y1="948" x2="670"  y2="972"/>
    <line x1="820"  y1="948" x2="820"  y2="972"/>
    <line x1="960"  y1="948" x2="960"  y2="972"/>
  </g>

  <!-- ── Chart area fill ────────────────────────────────────────── -->
  <!--
    Smooth cubic bezier through:
    (220,870) → (370,790) → (520,700) → (670,560) → (820,455) → (960,300)
  -->
  <path d="M 220,870
           C 280,855 320,810 370,790
           C 440,760 465,730 520,700
           C 590,660 625,600 670,560
           C 735,510 770,480 820,455
           C 880,425 920,360 960,300
           L 960,960 L 220,960 Z"
        fill="url(#areaGrad)"/>

  <!-- ── Chart line (glow layer) ───────────────────────────────── -->
  <path d="M 220,870
           C 280,855 320,810 370,790
           C 440,760 465,730 520,700
           C 590,660 625,600 670,560
           C 735,510 770,480 820,455
           C 880,425 920,360 960,300"
        fill="none"
        stroke="url(#lineGrad)"
        stroke-width="18"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#lineGlow)"
        opacity="0.55"/>

  <!-- ── Chart line (crisp top layer) ─────────────────────────── -->
  <path d="M 220,870
           C 280,855 320,810 370,790
           C 440,760 465,730 520,700
           C 590,660 625,600 670,560
           C 735,510 770,480 820,455
           C 880,425 920,360 960,300"
        fill="none"
        stroke="url(#lineGrad)"
        stroke-width="11"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- ── Data-point dots ────────────────────────────────────────── -->
  <circle cx="220" cy="870" r="12" fill="#22D3EE" opacity="0.8"/>
  <circle cx="370" cy="790" r="12" fill="#22D3EE" opacity="0.8"/>
  <circle cx="520" cy="700" r="12" fill="#5EEAD4" opacity="0.8"/>
  <circle cx="670" cy="560" r="12" fill="#818CF8" opacity="0.8"/>
  <circle cx="820" cy="455" r="12" fill="#818CF8" opacity="0.8"/>
  <!-- Peak dot: white ring -->
  <circle cx="960" cy="300" r="18" fill="#0B1628" stroke="#818CF8" stroke-width="5"/>
  <circle cx="960" cy="300" r="8"  fill="#818CF8"/>

  <!-- ── Location Pin ───────────────────────────────────────────── -->
  <!--
    Pin tip anchors at (960, 305).
    Pin path: 160 wide × 200 tall, tip at (80, 195).
    Translate: (960 - 80, 305 - 195) = (880, 110)
  -->

  <!-- Soft orange glow behind pin -->
  <circle cx="960" cy="180" r="90" fill="#FB923C" opacity="0.12" filter="url(#pinGlow)"/>

  <!-- Pin itself -->
  <g transform="translate(880, 110)" filter="url(#pinShadow)">
    <!-- Outer pulse ring 2 (faint) -->
    <circle cx="80" cy="80" r="90" fill="none" stroke="#FB923C" stroke-width="2.5" opacity="0.18"/>
    <!-- Outer pulse ring 1 -->
    <circle cx="80" cy="80" r="72" fill="none" stroke="#FB923C" stroke-width="3.5" opacity="0.32"/>

    <!-- Pin teardrop body -->
    <path d="M 80,0
             C 35.8,0 0,35.8 0,80
             C 0,124.2 80,195 80,195
             C 80,195 160,124.2 160,80
             C 160,35.8 124.2,0 80,0 Z"
          fill="url(#pinGrad)"/>

    <!-- White inner disc -->
    <circle cx="80" cy="80" r="44" fill="white" opacity="0.96"/>

    <!-- Orange inner dot -->
    <circle cx="80" cy="80" r="24" fill="url(#pinGrad)"/>

    <!-- White specular on pin body (top-left shine) -->
    <ellipse cx="52" cy="42" rx="18" ry="12"
             fill="white" opacity="0.22" transform="rotate(-30 52 42)"/>
  </g>

</svg>
