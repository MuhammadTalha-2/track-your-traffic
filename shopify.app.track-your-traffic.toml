# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration
# updated
client_id = "416a50d98b4d77d77d246d7984f037d0"
name = "Track Your Traffic"
application_url = "https://shopify-track-your-traffic-34cd.vercel.app/"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  # orders/create requires Protected Customer Data approval in Partner Dashboard
  # Uncomment after approval: https://partners.shopify.com → App → Configuration → Protected customer data
  # [[webhooks.subscriptions]]
  # topics = [ "orders/create" ]
  # uri = "/webhooks/orders/create"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,read_orders"

[auth]
redirect_urls = [ "https://shopify-track-your-traffic-34cd.vercel.app/api/auth" ]

[app_proxy]
url = "https://shopify-track-your-traffic-34cd.vercel.app/proxy"
subpath = "tyt"
prefix = "apps"
